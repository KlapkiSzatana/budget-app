name: Build & Release Budget App

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build:
    name: Build on ${{ matrix.os }}
    runs-on: ${{ matrix.os }}
    strategy:
      matrix:
        include:
          - os: windows-latest
            artifact_name: BudgetApp_Setup.exe
          - os: macos-14
            artifact_name: BudgetApp_macos.dmg
          - os: ubuntu-22.04
            artifact_name: BudgetApp_linux.tar.gz

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install PySide6 matplotlib pypdf pillow pyinstaller

      - name: Build Executable
        shell: bash
        run: |
          if [ "${{ matrix.os }}" == "windows-latest" ]; then
            # 1. Budowanie w trybie STANDALONE (bez --onefile, tworzy folder)
            python -m pip install reportlab
            python -m PyInstaller --noconfirm --windowed \
              --collect-all reportlab \
              --add-data "budget.png;." \
              --version-file "file_version_info.txt" \
              --icon "budget.ico" \
              --name "budget-app" \
              budget-app.py

            # 2. Tworzenie instalatora za pomocą Inno Setup
            "C:\Program Files (x86)\Inno Setup 6\ISCC.exe" installer.iss

            # 3. Czyszczenie i przygotowanie plików wynikowych dla Windowsa
            mkdir -p dist
            # Przenosimy instalator do folderu dist
            mv user_setup/BudgetApp_Setup.exe dist/BudgetApp_Setup.exe
            # Usuwamy pozostałości po PyInstallerze, żeby nie wrzucać ich do Release
            rm -rf dist/budget-app/
            rm -f dist/budget-app.exe
            rm -f dist/budget-app-windows.exe

          elif [ "${{ matrix.os }}" == "ubuntu-22.04" ]; then
            # 1. Instalacja wymaganej biblioteki przez pip w środowisku runnera
            python -m pip install reportlab

            # 2. Budowanie w trybie --onedir z kompletnym zebraniem zainstalowanej biblioteki
            python -m PyInstaller --noconfirm --onedir --windowed \
              --collect-all reportlab \
              --add-data "budget.png:." \
              --icon "budget.png" \
              --name "BudgetApp" \
              budget-app.py

            # USUWANIE PROBLEMATYCZNYCH BIBLIOTEK SYSTEMOWYCH
            # 1. Usuwamy readline (rozwiązuje błąd rl_trim_arg_from_keyseq w /bin/sh)
            rm -f dist/BudgetApp/_internal/libreadline.so*

            # 2. Usuwamy standardowe biblioteki C/C++ (rozwiązuje błąd GLIBCXX w kde-open/xdg-open)
            rm -f dist/BudgetApp/_internal/libstdc++.so*
            rm -f dist/BudgetApp/_internal/libgcc_s.so*

            mkdir -p linux-package
            cp -r dist/BudgetApp linux-package/
            cp budget.png linux-package/
            cp install.run linux-package/
            cp uninstall.run linux-package/

            chmod +x linux-package/install.run
            chmod +x linux-package/uninstall.run

            # Bezpieczny zapis pliku .desktop (wzorowany na PKGBUILD, bez błędów parsera macOS)
            echo "[Desktop Entry]" > linux-package/BudgetApp.desktop
            echo "Name=Home Budget" >> linux-package/BudgetApp.desktop
            echo "Name[pl]=Budżet Domowy" >> linux-package/BudgetApp.desktop
            echo "Comment=Home Budget Management" >> linux-package/BudgetApp.desktop
            echo "Comment[pl]=Zarządzanie Budżetem Domowym" >> linux-package/BudgetApp.desktop
            echo "Exec=/opt/BudgetApp/BudgetApp/BudgetApp" >> linux-package/BudgetApp.desktop
            echo "Icon=/opt/BudgetApp/budget.png" >> linux-package/BudgetApp.desktop
            echo "Terminal=false" >> linux-package/BudgetApp.desktop
            echo "Type=Application" >> linux-package/BudgetApp.desktop
            echo "Categories=Office;Finance;" >> linux-package/BudgetApp.desktop
            echo "StartupWMClass=BudgetApp" >> linux-package/BudgetApp.desktop
            echo "StartupNotify=false" >> linux-package/BudgetApp.desktop

            chmod +x linux-package/BudgetApp.desktop

            tar -czf dist/BudgetApp_linux.tar.gz linux-package

          else
            python -m pip install reportlab
            # 5. Dla macOS: budowanie w trybie --onedir (wymagane dla .app)
            python -m PyInstaller --noconfirm --onedir --windowed \
              --collect-all reportlab \
              --add-data "budget.png:." \
              --add-data "budget.icns:." \
              --icon "budget.icns" \
              --osx-bundle-identifier "com.klapkiszatana.budget-app" \
              --name "BudgetApp" \
              budget-app.py

            # 6. Pakowanie folderu aplikacji do formatu .dmg
            hdiutil create -volname "BudgetApp" -srcfolder dist/BudgetApp.app -ov -format UDZO dist/BudgetApp_macos.dmg
          fi

      - name: Create Release and Upload
        uses: softprops/action-gh-release@v2
        if: startsWith(github.ref, 'refs/tags/')
        with:
          files: |
            dist/BudgetApp_Setup.exe
            dist/BudgetApp_macos.dmg
            dist/BudgetApp_linux.tar.gz
          body: |
            ## Zmiany w tej wersji:
            - Poprawa wyświetlania skrótów kalwiaturowych w menu
            - Windows i MacOS poprawa problemów z pdf (zapisz, otwórz)
